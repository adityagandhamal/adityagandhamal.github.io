<li style="margin-bottom: 0.7em; font-size: 0.88em; line-height: 1.65; color: #333;">
  <strong>{{ post.title }}</strong>{% if post.slides %} &nbsp;|&nbsp; <a href="{{ post.slides }}" style="color:#2a6ebb; text-decoration:none; font-weight:600;">slides</a>{% endif %} &mdash; {{ post.location }}<br>
  <em>{{ post.venue }}</em> &nbsp;·&nbsp; {{ post.date | date: "%b %d, %Y" }}
  {% if post.excerpt %}<br>{{ post.excerpt }}{% endif %}
</li>
